    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      const SUPABASE_URL = "https://gmhnnahtfjcgnbeyzctq.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_fQ0No6cq6837PG0xo3SaSA_0x7R1nJI";
      const BOOK_TOTAL = 10;
      const DEFAULT_MEMBERS = [
        { id:"mary",  display_name:"Mary",  sort_order:3, password:"", is_first_login:true, member_code:"mary2026" },
        { id:"chad",  display_name:"Chad",  sort_order:1, password:"", is_first_login:true, member_code:"chad2026" },
        { id:"chloe", display_name:"Chloe", sort_order:2, password:"", is_first_login:true, member_code:"chloe99"  },
      ];

      const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let cache = { books: [] };
      let members = [];
      let currentTab = "reading";
      let currentBookId = "b3";
      let currentMemberId   = localStorage.getItem("currentMemberId")   || "";
      let currentMemberName = localStorage.getItem("currentMemberName") || "";
      let isGatePassed  = localStorage.getItem("isGatePassed")  === "true";
      let isAdminMode   = localStorage.getItem("isAdminMode")   === "true";
      let meetingEventsCache = [];
      let meetingPostsCache  = {};
      let meetingLoading     = false;
      let detailBookId = null;
      let uiModal = { type:null, error:"", meta:{} };
      let pendingSecureAction = null;
      let toastMessage = "";
      let toastTimer = null;
      let rtChannel = null;
      let debounceTimer = null;
      let scheduleCalMonth = {};
      let imageViewerState = { isOpen: false, images: [], currentIndex: 0 };

      // ── URL 인증 ──
      function checkUrlAuthentication() {
        const p = new URLSearchParams(window.location.search);
        const key = p.get('key');
        if (key) authenticateViaMagicLink(key);
        else if (!currentMemberId) showAccessDenied();
      }
      function authenticateViaMagicLink(code) {
        const m = memberList().find(x => x.member_code === code);
        if (m) {
          setMemberSession(m);
          if (window.history.replaceState) window.history.replaceState({}, document.title, window.location.pathname);
          initializeApp();
        } else showAccessDenied();
      }
      function showAccessDenied() {
        const root = document.getElementById("app-root");
        if (root) root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f7f1e5 0%,#e8dcc4 100%);font-family:'Georgia',serif;"><div style="background:white;padding:3rem;border-radius:1rem;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;max-width:400px;"><h1 style="color:#0c1f18;margin-bottom:1rem;font-size:2rem;">📚 BookVibe 2026</h1><p style="color:#666;margin-bottom:2rem;line-height:1.6;">Private Reading Club<br>Access by invitation only</p><div style="background:#f8f9fa;padding:1.5rem;border-radius:0.5rem;margin-bottom:1.5rem;border-left:4px solid #c4a35a;"><p style="color:#333;font-size:0.9rem;margin:0;">Please check your invitation email for your personal access link</p></div><p style="color:#999;font-size:0.8rem;">Questions? Contact your book club administrator</p></div></div>`;
      }
      function setMemberSession(m) {
        currentMemberId = m.id; currentMemberName = m.display_name;
        isAdminMode = m.id === 'chloe'; isGatePassed = true;
        localStorage.setItem("currentMemberId", m.id);
        localStorage.setItem("currentMemberName", m.display_name);
        localStorage.setItem("isAdminMode", String(m.id === 'chloe'));
        localStorage.setItem("isGatePassed", "true");
      }
      function clearMemberSession() {
        currentMemberId = ""; currentMemberName = ""; isAdminMode = false; isGatePassed = false;
        ["currentMemberId","currentMemberName","isAdminMode","isGatePassed"].forEach(k => localStorage.removeItem(k));
      }
      function logout() { clearMemberSession(); showAccessDenied(); }
      function initializeApp() {
        loadMembers().then(() => {
          refreshFromDb().then(() => {
            Promise.all([loadDailyReadings(), loadAllMeetingData()]).then(() => {
              subscribeRealtime(); renderApp();
            });
          });
        });
      }

      // ── 유틸 ──
      function memberList() { return members.length ? members : DEFAULT_MEMBERS; }
      function currentMember() { return memberList().find(m => m.id === currentMemberId) || null; }
      function memberNameById(id) { return memberList().find(m => m.id === id)?.display_name || "미선정"; }
      function escapeHtml(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
      function bookById(id) { return cache.books.find(b => b.id === id) || null; }
      function bookIdSortIndex(id) { const m = /^b(\d+)$/i.exec(String(id||"")); return m ? parseInt(m[1],10) : 1e9; }
      function sortRows(rows) { return (rows||[]).slice().sort((a,b) => bookIdSortIndex(a.id)-bookIdSortIndex(b.id)); }
      function emptyChapterRecord() { const o = {}; memberList().forEach(m => o[m.id] = ""); return o; }
      function alignChaptersToTotal(chapters, total) {
        const n = { ...(chapters||{}) };
        for (let c=1; c<=total; c++) if (!n[c]) n[c] = emptyChapterRecord();
        Object.keys(n).forEach(k => { const x=parseInt(k,10); if (Number.isFinite(x)&&x>total) delete n[k]; });
        return n;
      }
      function normalizeMilestones(raw) {
        raw = (raw && typeof raw === "object") ? raw : {};
        const meta = (raw._meta && typeof raw._meta === "object") ? raw._meta : {};
        const total = Math.max(1, parseInt(meta.totalChapters||4,10)||4);
        const chapters = {};
        for (let c=1; c<=total; c++) {
          const src = raw[c] ?? raw[String(c)] ?? {};
          const rec = emptyChapterRecord();
          memberList().forEach(m => { rec[m.id] = typeof src[m.id]==="string" ? src[m.id] : ""; });
          chapters[c] = rec;
        }
        return { chapters, total, guideIdInMeta: typeof meta.guideId==="string" ? meta.guideId : "" };
      }
      function normalizeBook(row, idx) {
        const norm = normalizeMilestones(row.milestones);
        const rawGuide = row.guide_id || row.guide_name || norm.guideIdInMeta || "";
        const guideId = memberList().find(m => m.id===rawGuide||m.display_name===rawGuide)?.id || memberList()[0]?.id || "";
        const totalChapters = Math.max(1, parseInt(row.total_chapters ?? norm.total, 10) || norm.total || 4);
        return {
          id: row.id || `b${idx+1}`, title: row.title || `2026 독서 ${idx+1}`,
          author: row.author||"", coverUrl: row.cover_url||"", guideId, guide_id: guideId,
          chapters: alignChaptersToTotal(norm.chapters, totalChapters), totalChapters,
          final_sentence_text: row.final_sentence_text||"",
          final_sentence_member_id: row.final_sentence_member_id||"",
          final_sentence_chapter: row.final_sentence_chapter||null,
          finalAt: row.final_at||null,
          is_book_of_the_month: !!row.is_book_of_the_month,
          schedules: row.schedules||{},
        };
      }
      function serializeMilestones(book) {
        const p = { _meta: { totalChapters: book.totalChapters, guideId: book.guideId } };
        for (let c=1; c<=book.totalChapters; c++) p[c] = book.chapters[c] || emptyChapterRecord();
        return p;
      }
      function bookToRow(book) {
        return { id:book.id, title:book.title, author:book.author||"", cover_url:book.coverUrl||null,
          guide_id:book.guideId, guide_name:memberNameById(book.guideId), total_chapters:book.totalChapters,
          milestones:serializeMilestones(book), final_sentence_text:book.final_sentence_text||"",
          final_sentence_member_id:book.final_sentence_member_id||"",
          final_sentence_chapter:book.final_sentence_chapter||null,
          final_at:book.finalAt, is_book_of_the_month:!!book.is_book_of_the_month,
          schedules:book.schedules||{}, updated_at:new Date().toISOString() };

      function chapterProgress(book) {
        const done = Array.from({length:book.totalChapters},(_,i)=>i+1)
          .filter(c => memberList().every(m => (book.chapters[c]?.[m.id]||"").trim())).length;
        return { done, total:book.totalChapters, pct:Math.round((done/Math.max(1,book.totalChapters))*100) };
      }

      function isChapterBlind(book, chapterNum) {
        const submittedCount = memberList().filter(m => (book.chapters[chapterNum]?.[m.id]||"").trim()).length;
        return submittedCount < memberList().length;

      // ── 챕터별 목표 일정: 구간 계산 & 달력 렌더 ──
      const SCHEDULE_PALETTE = ['color-soft-blue','color-pale-green','color-light-peach','color-lavender','color-soft-coral','color-mint-green','color-sky-blue','color-warm-yellow','color-blush-pink','color-periwinkle'];
      
      // 완료된 책 목록 추출
      function getCompletedBooks() {
        return cache.books.filter(book => {
          const prog = chapterProgress(book);
          return prog.done === prog.total && book.finalAt;
        });
      }
      
      // 책의 읽기 기간 계산
      function getBookReadingPeriod(book) {
        const groups = computeScheduleGroups(book);
        const validGroups = groups.filter(g => !g.unset);
        if (validGroups.length === 0) return null;
        
        const firstStart = validGroups[0].start;
        const lastEnd = validGroups[validGroups.length - 1].end;
        
        return { start: firstStart, end: lastEnd };
      }
      
      function computeScheduleGroups(book) {
        const raw = book.schedules || {};
        const groups = [];
        for (let c=1; c<=book.totalChapters; c++) {
          const d = raw[c] || "";
          const last = groups[groups.length-1];
          if (last && ((d && !last.unset && last.end===d) || (!d && last.unset))) last.chapters.push(c);
          else groups.push({ unset: !d, end: d, chapters: [c] });
        }
        let prevEnd = null; let ci = 0;
        groups.forEach(g => {
          if (g.unset) return;
          g.start = prevEnd ? dayjs(prevEnd).add(1,'day').format('YYYY-MM-DD') : (raw._start || g.end);
          g.color = SCHEDULE_PALETTE[ci % SCHEDULE_PALETTE.length]; ci++;
          prevEnd = g.end;
        });
        return groups;
      }
      function renderScheduleCalendarView(book) {
        const groups = computeScheduleGroups(book);
        const validGroups = groups.filter(g=>!g.unset);
        const unsetChapters = groups.filter(g=>g.unset).flatMap(g=>g.chapters);
        const todayStr = dayjs().format('YYYY-MM-DD');
        
        // 완료된 책 목록 및 읽기 기간
        const completedBooks = getCompletedBooks();
        const completedBookPeriods = completedBooks.map(b => ({
          book: b,
          period: getBookReadingPeriod(b)
        })).filter(x => x.period);
        
        if (!scheduleCalMonth[book.id]) {
          const active = validGroups.find(g=>todayStr>=g.start&&todayStr<=g.end) || validGroups.find(g=>g.end>=todayStr) || validGroups[validGroups.length-1];
          scheduleCalMonth[book.id] = active ? dayjs(active.end).format('YYYY-MM') : dayjs().format('YYYY-MM');
        }
        const monthStart = dayjs(scheduleCalMonth[book.id]+'-01');
        const daysInMonth = monthStart.daysInMonth();
        const firstDow = monthStart.day();
        let cells = '';
        for (let i=0;i<firstDow;i++) cells += '<div></div>';
        for (let d=1; d<=daysInMonth; d++) {
          const dateStr = monthStart.date(d).format('YYYY-MM-DD');
          const g = validGroups.find(x=>dateStr>=x.start&&dateStr<=x.end);
          const isToday = dateStr===todayStr, isEnd = g&&dateStr===g.end;
          
          // 해당 날짜에 완료된 책이 있는지 확인
          const completedOnDate = completedBookPeriods.filter(x => 
            dateStr >= x.period.start && dateStr <= x.period.end
          );
          
          let thumbnailHtml = '';
          if (completedOnDate.length > 0) {
            const displayBooks = completedOnDate.slice(0, 2);
            const remainingCount = completedOnDate.length - 2;
            
            thumbnailHtml = '<div class="cal-thumbnails">';
            displayBooks.forEach(item => {
              const coverUrl = item.book.coverUrl || '';
              if (coverUrl) {
                thumbnailHtml += `<img src="${escapeHtml(coverUrl)}" alt="${escapeHtml(item.book.title)}" class="cal-thumbnail" data-open-book="${item.book.id}" title="${escapeHtml(item.book.title)}"/>`;
              }
            });
            if (remainingCount > 0) {
              thumbnailHtml += `<span class="cal-thumbnail-more">+${remainingCount}</span>`;
            }
            thumbnailHtml += '</div>';
          }
          
          cells += `<div class="cal-cell ${g?g.color+' has-range':''} ${isEnd?'is-end':''} ${isToday?'is-today':''}">${d}${isToday?'<span class="cal-today-tag">오늘</span>':''}${thumbnailHtml}</div>`;
        }
        const legend = validGroups.map(g => {
          const label = g.chapters.length>1 ? `Ch${g.chapters[0]}-${g.chapters[g.chapters.length-1]}` : `Ch${g.chapters[0]}`;
          return `<span class="cal-legend-chip" data-jump-month="${dayjs(g.end).format('YYYY-MM')}" data-book="${book.id}"><span class="cal-legend-dot ${g.color}"></span>${label} · ${dayjs(g.end).format('M/D')}</span>`;
        }).join('');
        const unsetLine = unsetChapters.length ? `<p class="mt-2 text-xs text-deep/40">일정 미정: ${unsetChapters.map(c=>`Chapter ${c}`).join(', ')}</p>` : '';
        return `<div class="schedule-calendar">
          <div class="flex items-center justify-between mb-2">
            <span class="cal-nav-btn" data-cal-nav="prev" data-book="${book.id}">‹</span>
            <span class="text-sm font-bold text-deep">${monthStart.format('YYYY년 M월')}</span>
            <span class="cal-nav-btn" data-cal-nav="next" data-book="${book.id}">›</span>
          </div>
          <div class="cal-grid mb-1">${['일','월','화','수','목','금','토'].map(w=>`<div class="cal-weekday">${w}</div>`).join('')}</div>
          <div class="cal-grid">${cells}</div>
          <div class="cal-legend">${legend}</div>
          ${unsetLine}
        </div>`;
      }

      async function toggleReaction(readingId, emoji) {
        if (!currentMemberId) return false;
        try {
          const { data:ex, error:fe } = await sb.from('reading_reactions').select('id')
            .eq('reading_id',readingId).eq('member_id',currentMemberId).eq('emoji',emoji).single();
          if (fe&&fe.code!=='PGRST116') throw fe;
          if (ex) await sb.from('reading_reactions').delete().eq('id',ex.id);
          else await sb.from('reading_reactions').insert({reading_id:readingId,member_id:currentMemberId,emoji});
          const { data:counts } = await sb.from('reading_reactions').select('emoji').eq('reading_id',readingId);
          // Get existing reactions to preserve history
          const { data:reading } = await sb.from('daily_readings').select('reactions').eq('id',readingId).single();
          const existingReactions = reading?.reactions || {};
          const updated = { ...existingReactions };
          // Update counts for all emojis that have reactions
          const allEmojis = [...new Set([...REACTION_EMOJIS, ...Object.keys(existingReactions)])];
          allEmojis.forEach(e => { updated[e]=Math.max(0,(counts||[]).filter(r=>r.emoji===e).length); });
          await sb.from('daily_readings').update({reactions:updated}).eq('id',readingId);
          return true;
        } catch(e) { console.error(e); return false; }
      }

      function formatTimeAgo(d) {

        if (m<1) return '방금'; if (m<60) return `${m}분 전`; if (m<1440) return `${Math.floor(m/60)}시간 전`; return `${Math.floor(m/1440)}일 전`;
      }
      function formatTime(d) { return new Date(d).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
      function renderDailyReadingComments() {
        const el = document.getElementById('daily-reading-comments'); if (!el) return;
        if (!dailyReadingsCache.length) { el.innerHTML=`<div class="text-center py-4 text-deep/45 text-sm">아직 독서 기록이 없습니다.</div>`; return; }

          const reactions=r.reactions||{};
          // Show all existing reactions, not just new ones
          const allEmojis = Object.keys(reactions).filter(e => reactions[e] > 0);
          const chips = allEmojis.map(e => {
            const reactors=(r.reading_reactions||[]).filter(x=>x.emoji===e);
            const names=reactors.map(x=>x.member_id===currentMemberId?`나(${x.club_members?.display_name||'?'})`:x.club_members?.display_name||'?');
            return `<span class="reaction-chip px-2 py-1 bg-deep/10 rounded-full text-xs flex items-center gap-1 cursor-pointer hover:bg-deep/20" data-emoji="${e}" data-reading-id="${r.id}" data-attribution="${escapeHtml(names.join(', ')+'님이 리액션을 남겼습니다.')}"><span>${e}</span><span class="font-medium">${reactions[e]}</span></span>`;
          }).join('');
          return `<div class="daily-reading-item p-4 bg-deep/5 rounded-lg" data-reading-id="${r.id}">
            <div class="flex items-start justify-between mb-2">
              <div class="flex items-center gap-2"><span class="text-sm font-medium text-deep">${escapeHtml(name)}</span><span class="text-xs text-deep/45">${formatTime(r.created_at)}</span><span class="text-xs text-deep/30">${formatTimeAgo(r.created_at)}</span></div>
              ${isOwner?`<div class="flex gap-1"><button class="edit-btn text-xs text-deep/60 hover:text-deep px-2 py-1 hover:bg-deep/10 rounded" data-reading-id="${r.id}" data-content="${escapeHtml(r.content)}">수정</button><button class="delete-btn text-xs text-red-600 px-2 py-1 hover:bg-red-50 rounded" data-reading-id="${r.id}">삭제</button></div>`:''}
            </div>

            <div class="flex items-center justify-between relative">
              <div class="flex gap-1">${chips||'<span class="text-xs text-deep/30">반응 없음</span>'}</div>

                <button class="reaction-toggle-btn px-3 py-1 bg-deep/10 hover:bg-deep/20 rounded-full text-xs" data-reading-id="${r.id}">+ 반응</button>
                <div class="reaction-popup hidden absolute right-0 top-full mt-1 z-10 bg-white border border-deep/20 rounded-lg p-2 shadow-lg" style="width:max-content;max-width:calc(100vw - 2.5rem);" data-reading-id="${r.id}">
                  <div class="grid gap-0.5" style="grid-template-columns:repeat(${Math.ceil(REACTION_EMOJIS.length/2)},minmax(0,1fr));">${REACTION_EMOJIS.map(e=>`<button class="reaction-option px-2 py-1.5 hover:bg-deep/10 rounded text-base" data-emoji="${e}" data-reading-id="${r.id}">${e}</button>`).join('')}</div>
                </div>
              </div>
            </div>
          </div>`;
        }).join('');
      }
      function handleReactionToggle(readingId, emoji) {
        const r = dailyReadingsCache.find(x=>x.id===readingId);
        if (r) {
          const has = r.reading_reactions?.find(x=>x.member_id===currentMemberId&&x.emoji===emoji);
          if (has) {

            r.reactions[emoji]=Math.max(0,(r.reactions[emoji]||0)-1);
            r.reading_reactions=r.reading_reactions?.filter(x=>!(x.member_id===currentMemberId&&x.emoji===emoji))||[];

        });
      }

      // ── Image Viewer Functions ──
      function openImageViewer(images, startIndex = 0) {
        imageViewerState = { isOpen: true, images: images, currentIndex: startIndex };
        renderImageViewer();
      }

      function closeImageViewer() {
        imageViewerState = { isOpen: false, images: [], currentIndex: 0 };
        const viewer = document.getElementById('image-viewer');
        if (viewer) viewer.remove();
      }

      function navigateImageViewer(direction) {
        const { images, currentIndex } = imageViewerState;
        if (images.length === 0) return;
        
        if (direction === 'next') {
          imageViewerState.currentIndex = (currentIndex + 1) % images.length;
        } else if (direction === 'prev') {
          imageViewerState.currentIndex = (currentIndex - 1 + images.length) % images.length;
        }
        
        renderImageViewer();
      }

      function renderImageViewer() {
        const { isOpen, images, currentIndex } = imageViewerState;
        if (!isOpen || images.length === 0) return;

        let viewer = document.getElementById('image-viewer');
        if (!viewer) {
          viewer = document.createElement('div');
          viewer.id = 'image-viewer';
          viewer.className = 'image-viewer';
          document.body.appendChild(viewer);
          
          // Add touch swipe support (only once)
          let touchStartX = 0;
          let touchEndX = 0;

          viewer.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
          }, { passive: true });

          viewer.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
          }, { passive: true });

          function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
              if (diff > 0) {
                navigateImageViewer('next');
              } else {
                navigateImageViewer('prev');
              }
            }
          }

          // Add keyboard navigation (only once)
          const handleKeydown = (e) => {
            if (!imageViewerState.isOpen) return;
            
            if (e.key === 'Escape') {
              closeImageViewer();
            } else if (e.key === 'ArrowLeft') {
              navigateImageViewer('prev');
            } else if (e.key === 'ArrowRight') {
              navigateImageViewer('next');
            }
          };

          document.addEventListener('keydown', handleKeydown);
          viewer.dataset.keydownHandler = 'true';
        }

        const currentImage = images[currentIndex];
        viewer.innerHTML = `
          <div class="image-viewer-container">
            <img src="${escapeHtml(currentImage)}" alt="이미지" class="image-viewer-img"/>
            <button class="image-viewer-close" onclick="window.closeImageViewer()">×</button>
            ${images.length > 1 ? `
              <button class="image-viewer-nav image-viewer-prev" onclick="window.navigateImageViewer('prev')">‹</button>
              <button class="image-viewer-nav image-viewer-next" onclick="window.navigateImageViewer('next')">›</button>
              <div class="image-viewer-counter">${currentIndex + 1} / ${images.length}</div>
            ` : ''}
          </div>
        `;
      }

      // Expose functions to window
      window.openImageViewer = openImageViewer;
      window.closeImageViewer = closeImageViewer;

      function renderBottomTabs() {
        const tab=(id,label)=>`<button type="button" class="flex-1 py-4 text-center text-[12px] font-semibold transition-all duration-200 ${currentTab===id?"text-gold":"text-deep/50 hover:text-deep/80"}" data-tab="${id}">${label}</button>`;

      function renderApp() {
        const root=document.getElementById("app-root"); if (!root) return;
        const main=isGatePassed&&currentMemberId
          ? currentTab==="shelf" ? renderBookshelfTab()
          : currentTab==="hall"  ? renderHallTab()
          : currentTab==="meeting" ? renderMeetingTab()
          : currentTab==="settings" ? renderSettingsTab()
          : renderReadingTab()
          : `<main class="min-h-screen"></main>`;
        root.innerHTML=`${isGatePassed&&currentMemberId?renderHeader():""}${main}${isGatePassed&&currentMemberId?renderBottomTabs():""}${toastMessage?`<div class="toast">${escapeHtml(toastMessage)}</div>`:""}`;
        if (isGatePassed&&currentMemberId&&currentTab==="reading") setTimeout(()=>renderDailyReadingComments(),100);
      }

      // ── window 함수 ──
      window.editSentence=function(c,mid,cur){const li=document.querySelector(`[data-chapter="${c}"][data-member="${mid}"]`);if(!li)return;li.querySelector('.sentence-view')?.classList.add('hidden');li.querySelector('.sentence-edit')?.classList.remove('hidden');const ta=li.querySelector(`#edit-${c}-${mid}`);if(ta){ta.value=cur;ta.focus();}};
      window.cancelEdit=function(c,mid){const li=document.querySelector(`[data-chapter="${c}"][data-member="${mid}"]`);if(!li)return;li.querySelector('.sentence-view')?.classList.remove('hidden');li.querySelector('.sentence-edit')?.classList.add('hidden');};
      window.saveSentence=async function(c,mid){
        if(mid!==currentMemberId){alert('자신의 문장만 수정할 수 있습니다.');return;}
        const li=document.querySelector(`[data-chapter="${c}"][data-member="${mid}"]`);if(!li)return;
        const val=li.querySelector(`#edit-${c}-${mid}`)?.value?.trim();if(!val){alert('문장을 입력해주세요.');return;}
        const sel=cache.books.find(b=>b.id===currentBookId);if(!sel)return;
        if(!sel.chapters[c])sel.chapters[c]=emptyChapterRecord();
        sel.chapters[c][mid]=val; await persistBook(sel); await refreshFromDb(); renderApp(); showToast('문장이 수정되었습니다.');
      };
      window.deleteSentence=async function(c,mid){
        if(mid!==currentMemberId){alert('자신의 문장만 삭제할 수 있습니다.');return;}
        if(!confirm('이 문장을 삭제하시겠습니까?'))return;
        const sel=cache.books.find(b=>b.id===currentBookId);if(!sel)return;
        if(sel.chapters[c])delete sel.chapters[c][mid];
        await persistBook(sel); await refreshFromDb(); renderApp(); showToast('문장이 삭제되었습니다.');
      };
      window.confirmDeleteBook=async function(bookId){
        if(currentMemberId!=='chloe')return;
        const book=cache.books.find(b=>b.id===bookId);if(!book)return;
        if(!confirm(`"${book.title}" 책을 삭제하시겠습니까?`))return;
        const{error}=await sb.from("books").delete().eq("id",bookId);if(error)throw error;
        await refreshFromDb();renderApp();showToast(`"${book.title}" 삭제됐습니다.`);
      };
      window.setBookOfTheMonthDirect=async function(bookId,bookTitle){
        if(currentMemberId!=='chloe'){showToast("관리자 기능에 접근할 수 없습니다.");return;}
        const btn=document.getElementById(`btn-set-book-month-${bookId}`);if(!btn||btn.disabled)return;
        const orig=btn.textContent;btn.disabled=true;btn.textContent='선정 중...';
        try{
          await sb.from("books").update({is_book_of_the_month:false}).neq('id','nonexistent');
          await sb.from("books").update({is_book_of_the_month:true}).eq("id",bookId);
          currentBookId=bookId;await refreshFromDb();renderApp();closeModal();
          showToast(`"${bookTitle}"이(가) 이달의 책으로 선정되었습니다.`);
        }catch(e){showToast('이달의 책 선정에 실패했습니다.');btn.disabled=false;btn.textContent=orig;}
      };

      // ── 보안 ──
      function askSecure(action,msg){pendingSecureAction=action;openModal("secure-confirm",{message:msg});}
      async function executeSecureAction(){
        if(!pendingSecureAction)return;
        if(pendingSecureAction.type==="final-select"){
          const{bookId,memberId,chapter}=pendingSecureAction.payload;
          const b=cache.books.find(x=>x.id===bookId);if(!b)return;
          const txt=(b.chapters[chapter]?.[memberId]||"").trim();if(!txt)return;
          b.final_sentence_text=txt;b.final_sentence_member_id=memberId;b.final_sentence_chapter=chapter;b.finalAt=new Date().toISOString();
          await persistBook(b);await refreshFromDb();
        } else if(pendingSecureAction.type==="book-edit"){
          const{bookId,payload}=pendingSecureAction.payload;
          const b=cache.books.find(x=>x.id===bookId);if(!b)return;
          b.title=payload.title||b.title;b.author=payload.author||"";b.coverUrl=payload.coverUrl||"";
          if(currentMemberId==='chloe'&&payload.guideId)b.guideId=payload.guideId;
          const next=Math.min(10,Math.max(1,parseInt(payload.totalChapters,10)||1));
          if(next>b.totalChapters)for(let c=b.totalChapters+1;c<=next;c++)b.chapters[c]=emptyChapterRecord();
          if(next<b.totalChapters)for(let c=b.totalChapters;c>next;c--)delete b.chapters[c];
          b.totalChapters=next;await persistBook(b);await refreshFromDb();
        }
        pendingSecureAction=null;
      }

      // ── 이벤트 바인딩 ──
      function bindEvents(){
        document.addEventListener("click", async(e)=>{
          const t=e.target;
          const tabEl=t.closest&&t.closest("[data-tab]");
          if(tabEl){
            currentTab=tabEl.getAttribute("data-tab");
            if(currentTab==="meeting"&&!meetingEventsCache.length) await loadAllMeetingData();
            return renderApp();
          }
          if(t.id==="btn-logout"){logout();return;}
          if(t.id==="btn-new-meeting-event"){openModal("new-meeting-event");return;}

          const calNav=t.closest&&t.closest("[data-cal-nav]");
          if(calNav){
            const bookId=calNav.getAttribute("data-book"), dir=calNav.getAttribute("data-cal-nav");
            const cur=scheduleCalMonth[bookId]||dayjs().format('YYYY-MM');
            scheduleCalMonth[bookId]=dayjs(cur+'-01').add(dir==='next'?1:-1,'month').format('YYYY-MM');
            return renderApp();
          }
          const legendChip=t.closest&&t.closest("[data-jump-month]");
          if(legendChip){
            scheduleCalMonth[legendChip.getAttribute("data-book")]=legendChip.getAttribute("data-jump-month");
            return renderApp();
          }
          if(t.id==="bulk-apply-btn"){
            const s=parseInt(document.getElementById('bulk-start-ch')?.value,10);
            const en=parseInt(document.getElementById('bulk-end-ch')?.value,10);
            const val=document.getElementById('bulk-date')?.value;
            if(!val||!s||!en||s>en){alert('시작/종료 챕터와 날짜를 올바르게 입력해주세요.');return;}
            for(let c=s;c<=en;c++){const el=document.getElementById(`schedule-input-${c}`);if(el)el.value=val;}
            return;
          }

          const toggleBtn=t.closest(".mp-toggle-form");
          if(toggleBtn){const eid=toggleBtn.dataset.eventId;const f=document.getElementById(`add-form-${eid}`);if(f)f.style.display=f.style.display==="none"?"":"none";return;}

          const postBtn=t.closest(".mp-post-btn");
          if(postBtn){
            const eid=postBtn.dataset.eventId;
            const content=document.getElementById(`post-content-${eid}`)?.value||"";
            const photoInput=document.getElementById(`post-photos-${eid}`);
            let photoUrls=[];
            if(photoInput?.files?.length) photoUrls=await handleImageUpload({target:photoInput},5);
            const ok=await postMeetingPost(eid,content,photoUrls);
            if(ok){showToast("기록이 등록됐습니다!");renderApp();}
            return;
          }
          const delPostBtn=t.closest(".mp-delete-btn");
          if(delPostBtn){const ok=await deleteMeetingPost(delPostBtn.dataset.postId,delPostBtn.dataset.eventId);if(ok){showToast("삭제됐습니다.");renderApp();}return;}
          const delEvtBtn=t.closest(".mp-del-event-btn");
          if(delEvtBtn){const ok=await deleteMeetingEvent(delEvtBtn.dataset.eventId);if(ok){showToast("모임 기록이 삭제됐습니다.");renderApp();}return;}
          const fileEl=t.closest('input[type="file"]');
          if(fileEl){fileEl.addEventListener("change",()=>{const eid=fileEl.id.replace("post-photos-","");const prev=document.getElementById(`preview-${eid}`);if(!prev)return;prev.innerHTML=Array.from(fileEl.files).slice(0,5).map(f=>`<img src="${URL.createObjectURL(f)}" class="photo-preview-thumb" alt="미리보기"/>`).join("");},{once:true});return;}

          const photoThumb=t.closest('.meeting-photo-thumb');
          if(photoThumb){
            const strip=photoThumb.closest('.meeting-photo-strip');
            const photosJson=strip?.dataset.postPhotos;
            if(photosJson){
              try{
                const photos=JSON.parse(photosJson);
                const index=parseInt(photoThumb.dataset.photoIndex,10)||0;
                openImageViewer(photos,index);
              }catch(e){console.error('Failed to parse photos:',e);}
            }
            return;
          }

          if(t.id==="daily-reading-post"){const inp=document.getElementById('daily-reading-input');const ok=await postDailyReading(inp?.value||"");if(ok){if(inp)inp.value="";await loadDailyReadings();renderDailyReadingComments();}return;}

          const closeMBtn=t.closest&&t.closest("[data-close-modal]");if(closeMBtn){closeModal();return renderApp();}
          const openBookEl=t.closest&&t.closest("[data-open-book]");if(openBookEl){openModal("book-detail",{bookId:openBookEl.getAttribute("data-open-book")});return;}
          const pickEl=t.closest&&t.closest("[data-select-final]");
          if(pickEl){
            const b=cache.books.find(x=>x.id===pickEl.getAttribute("data-book"));
            if(!b||!isGuideFor(b))return alert("길잡이만 최종 문장을 선택할 수 있습니다.");
            askSecure({type:"final-select",payload:{bookId:pickEl.getAttribute("data-book"),memberId:pickEl.getAttribute("data-member"),chapter:parseInt(pickEl.getAttribute("data-chapter"),10)}},"길잡이 본인 인증을 위해 비밀번호를 다시 입력하세요.");
            return renderApp();
          }

          // Daily reading 상호작용
          if(!document.getElementById('daily-reading-comments')?.contains(t)){document.querySelectorAll('.reaction-popup').forEach(p=>p.classList.add('hidden'));return;}
          const rtBtn=t.closest('.reaction-toggle-btn');if(rtBtn){const p=document.querySelector(`.reaction-popup[data-reading-id="${rtBtn.dataset.readingId}"]`);if(p){p.classList.toggle('hidden');document.querySelectorAll('.reaction-popup').forEach(x=>x!==p&&x.classList.add('hidden'));}return;}
          const roBtn=t.closest('.reaction-option');if(roBtn){handleReactionToggle(roBtn.dataset.readingId,roBtn.dataset.emoji);document.querySelector(`.reaction-popup[data-reading-id="${roBtn.dataset.readingId}"]`)?.classList.add('hidden');return;}
          const editBtn2=t.closest('.edit-btn');if(editBtn2){const nc=prompt('내용을 수정하세요:',editBtn2.dataset.content);if(nc!==null){const r=dailyReadingsCache.find(x=>x.id===editBtn2.dataset.readingId);if(r){r.content=nc.trim();renderDailyReadingComments();}editDailyReading(editBtn2.dataset.readingId,nc).then(ok=>{if(ok)setTimeout(()=>loadDailyReadings().then(()=>renderDailyReadingComments()),500);else loadDailyReadings().then(()=>renderDailyReadingComments());});}return;}
          const delBtn2=t.closest('.delete-btn');if(delBtn2){if(confirm('정말로 삭제하시겠습니까?')){const idx=dailyReadingsCache.findIndex(x=>x.id===delBtn2.dataset.readingId);if(idx>-1){dailyReadingsCache.splice(idx,1);renderDailyReadingComments();}deleteDailyReading(delBtn2.dataset.readingId).then(ok=>{if(!ok)loadDailyReadings().then(()=>renderDailyReadingComments());});}return;}
        });

        // Long press handler for reaction chips
        let longPressTimer = null;
        let longPressTarget = null;
        const LONG_PRESS_DURATION = 500;

        document.addEventListener('touchstart', (e) => {
          const chip = e.target.closest('.reaction-chip');
          if (chip) {
            longPressTarget = chip;
            longPressTimer = setTimeout(() => {
              const attribution = chip.dataset.attribution;
              if (attribution) alert(attribution);
              longPressTarget = null;
            }, LONG_PRESS_DURATION);
          }
        }, { passive: true });

        document.addEventListener('touchend', () => {
          if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
          }
          longPressTarget = null;
        });

        document.addEventListener('touchmove', () => {
          if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
          }
          longPressTarget = null;
        });

        // Desktop long press with mouse
        document.addEventListener('mousedown', (e) => {
          const chip = e.target.closest('.reaction-chip');
          if (chip) {
            longPressTarget = chip;
            longPressTimer = setTimeout(() => {
              const attribution = chip.dataset.attribution;
              if (attribution) alert(attribution);
              longPressTarget = null;
            }, LONG_PRESS_DURATION);
          }
        });

        document.addEventListener('mouseup', () => {
          if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
          }
          longPressTarget = null;
        });

        document.addEventListener("change",(e)=>{
          if(e.target?.name==="bookPick"&&uiModal.type==="book-settings"){openModal("book-settings",{bookId:(e.target.value||"").trim()});renderApp();}
        });

        document.addEventListener("submit",async(e)=>{
          const form=e.target;if(form.tagName!=="FORM")return;e.preventDefault();
          try{
            if(form.id==="form-new-meeting-event"){
              const bookId=form.elements.namedItem("bookId").value;
              const meetingDate=form.elements.namedItem("meetingDate").value;
              const location=form.elements.namedItem("location").value;
              if(!meetingDate||!location.trim()){alert("날짜와 장소를 입력해주세요.");return;}
              const ok=await postMeetingEvent({bookId,meetingDate,location});
              if(ok){closeModal();showToast("모임이 등록됐습니다!");renderApp();}
              return;
            }
            if(form.id==="form-first-password"){
              const pw=form.elements.namedItem("password").value.trim(), cf=form.elements.namedItem("confirmPassword").value.trim();
              if(!pw||pw!==cf){openModal("first-login",uiModal.meta,"비밀번호가 일치하지 않습니다.");return renderApp();}
              const{error}=await sb.from('club_members').update({password:pw,is_first_login:false}).eq('id',currentMemberId).select();
              if(error){alert("Save failed: "+error.message);return;}
              await loadMembers();await refreshFromDb();subscribeRealtime();closeModal();return renderApp();
            }
            if(form.id==="form-schedule-settings"){
              if(currentMemberId!=='chloe'){alert("관리자 기능에 접근할 수 없습니다.");return;}
              const bookId=form.elements.namedItem("bookId").value, book=cache.books.find(b=>b.id===bookId);if(!book)return;
              const schedules={};
              const startVal=form.elements.namedItem("startDate")?.value;
              if(startVal)schedules._start=startVal;
              for(let i=1;i<=book.totalChapters;i++){const d=form.elements.namedItem(`schedule-${i}`);if(d?.value)schedules[i]=d.value;}
              const{error}=await sb.from('books').update({schedules}).eq('id',bookId).select();
              if(error){alert("일정 저장 실패: "+error.message);return;}
              delete scheduleCalMonth[bookId];
              await refreshFromDb();closeModal();return renderApp();
            }
            if(form.id==="form-book-settings"){
              if(currentMemberId!=='chloe'){alert("관리자 기능에 접근할 수 없습니다.");return;}
              const pick=(form.elements.namedItem("bookPick").value||"").trim(), newId=(form.elements.namedItem("bookId").value||"").trim();
              const tid=(newId||pick||"").trim();if(!/^b\d+$/i.test(tid))return alert("책 ID는 b1, b2 형식으로 입력해주세요.");
              const book=ensureBook(tid.toLowerCase());
              book.title=(form.elements.namedItem("title").value||"").trim()||book.title;
              book.author=(form.elements.namedItem("author").value||"").trim();
              book.guideId=form.elements.namedItem("guideId").value;
              const next=Math.min(10,Math.max(1,parseInt(form.elements.namedItem("totalChapters").value,10)||1));
              book.totalChapters=next;book.chapters=alignChaptersToTotal(book.chapters,next);
              const cu=(form.elements.namedItem("coverUrl").value||"").trim();if(cu)book.coverUrl=cu;
              await persistBook(book);await refreshFromDb();closeModal();renderApp();showToast("책 정보가 업데이트되었습니다!");
              return;
            }
            if(form.id==="form-secure-confirm"){
              const me=currentMember();const pw=form.elements.namedItem("password").value;
              if(!me||(me.password||"")!==pw){openModal("secure-confirm",uiModal.meta,"비밀번호가 일치하지 않습니다.");return renderApp();}
              await executeSecureAction();closeModal();return renderApp();
            }
            if(!isGatePassed||!currentMemberId)return;
            if(form.id==="form-reading-input"){
              const chapter=parseInt(form.elements.namedItem("chapter").value,10), sentence=form.elements.namedItem("sentence").value.trim();
              const b=cache.books.find(x=>x.id===currentBookId);if(!b||!chapter||!sentence)return;
              if(!b.chapters[chapter])b.chapters[chapter]=emptyChapterRecord();
              b.chapters[chapter][currentMemberId]=sentence;
              form.reset();await persistBook(b);await refreshFromDb();return renderApp();
            }
            if(form.id==="form-change-password"){
              const me=currentMember();if(!me)return;
              const cur=form.elements.namedItem("currentPassword").value, next=form.elements.namedItem("newPassword").value, conf=form.elements.namedItem("confirmPassword").value;
              if((me.password||"")!==cur)return alert("현재 비밀번호가 일치하지 않습니다.");
              if(!next||next!==conf)return alert("새 비밀번호 확인이 일치하지 않습니다.");
              await sb.from("club_members").update({password:next,is_first_login:false}).eq("id",me.id);
              await loadMembers();form.reset();return alert("비밀번호가 변경되었습니다.");
            }
            const resetId=form.getAttribute("data-member-reset");
            if(resetId&&currentMemberId==='chloe'){
              const temp=form.elements.namedItem("newPassword").value.trim();
              const patch=temp?{password:temp,is_first_login:false}:{password:null,is_first_login:true};
              await sb.from("club_members").update(patch).eq("id",resetId);
              await loadMembers();renderApp();return alert("멤버 상태가 업데이트되었습니다.");
            }
          }catch(err){alert(err.message||String(err));}
        });
      }

      document.addEventListener("DOMContentLoaded",async()=>{
        try{
          await loadMembers(); bindEvents(); checkUrlAuthentication();
          if(isGatePassed&&currentMemberId) initializeApp();
        }catch(err){showAccessDenied();}
      });
    </script>
  </body>
</html>
