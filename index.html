      body {

      .book-card img {
        width: 100%;
        height: 100%;

      }
      /* Pastel-toned cards for missing covers */

        background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 50%, #74b9ff 100%);

        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;

      }

        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.03) 2px,

      .modal-bg {

      #modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;

      .toast {

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

      const SUPABASE_URL = "https://gmhnnahtfjcgnbeyzctq.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_fQ0No6cq6837PG0xo3SaSA_0x7R1nJI";
      const USER_PASSWORD = "stair";
      const BOOK_TOTAL = 10;
      const DEFAULT_MEMBERS = [
        { id: "mary", display_name: "Mary", sort_order: 3, password: "", is_first_login: true },
        { id: "chad", display_name: "Chad", sort_order: 1, password: "", is_first_login: true },
        { id: "chloe", display_name: "Chloe", sort_order: 2, password: "", is_first_login: true },
      ];

      const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      let cache = { books: [] };
      let members = [];
      let currentTab = "reading";
      let currentBookId = "b3";
      let currentMemberId = sessionStorage.getItem("currentMemberId") || "";
      let currentMemberName = sessionStorage.getItem("currentMemberName") || "";
      let isGatePassed = sessionStorage.getItem("isGatePassed") === "true";
      let isAdminMode = sessionStorage.getItem("isAdminMode") === "true";
      let detailBookId = null;
      let uiModal = { type: null, error: "", meta: {} };
      let pendingSecureAction = null;
      let toastMessage = "";
      let toastTimer = null;
      let loadError = null;
      let rtChannel = null;
      let debounceTimer = null;

      // Safe parse function for nested JSON strings
      function safeParse(data) {
        if (typeof data !== 'string') return data;
        
        try {
          const parsed = JSON.parse(data);
          // Recursively parse until we get a non-string object or primitive
          return safeParse(parsed);
        } catch (e) {
          // If parsing fails, return the original string
          return data;
        }
      }

      function memberList() {
        return members.length ? members : DEFAULT_MEMBERS;
      }
      function currentMember() {
        return memberList().find((m) => m.id === currentMemberId) || null;
      }
      function memberNameById(id) {
        const member = memberList().find((m) => m.id === id);
        return member ? member.display_name : "미선정";
      }
      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function openModal(type, meta = {}, error = "") {
        uiModal = { type, meta, error };
        
        // Handle global modal overlay
        const modalOverlay = document.getElementById("modal-overlay");
        const modalContent = document.getElementById("modal-content");
        
        if (modalOverlay && modalContent) {
          if (type) {
            // Close any existing modal first
            if (modalOverlay.style.display !== 'none') {
              modalOverlay.style.display = 'none';
              modalOverlay.classList.add("hidden");
              modalContent.innerHTML = "";
            }
            
            // Show modal
            modalOverlay.style.display = 'flex';
            modalOverlay.classList.remove("hidden");
            
            // Disable scrolling
            document.body.style.overflow = 'hidden';
            
            // Inject modal content based on type
            if (type === "book-detail") {
              const bookId = meta.bookId || "";
              const book = cache.books.find((b) => b.id === bookId);
              if (!book) {
                modalContent.innerHTML = `<div class="paper-panel p-6">책을 찾을 수 없습니다.</div>`;
              } else {
                const canSelect = isGuideFor(book);
                const rows = Array.from({ length: book.totalChapters }, (_, i) => i + 1)
                  .map((c) => `<section class="mt-3 rounded-lg border border-deep/10 bg-white/70 p-3"><h4 class="font-semibold text-sm text-deep">Chapter ${c}</h4><ul class="mt-2 space-y-2">${memberList().map((m) => {
                      const txt = (book.chapters[c]?.[m.id] || "").trim();
                      return `<li class="rounded-md border border-deep/10 px-2 py-2"><span class="text-[11px] font-semibold text-deep/55">${escapeHtml(m.display_name)}</span><p class="text-sm text-deep/85">${txt ? escapeHtml(txt) : `<span class="text-deep/35">기록 없음</span>`}</p>${txt ? `<div class="mt-1.5 text-right"><button type="button" class="btn-ghost !px-2.5 !py-1 !text-[11px] ${canSelect ? "" : "opacity-40"}" data-select-final="1" data-book="${book.id}" data-member="${m.id}" data-chapter="${c}" ${canSelect ? "" : "disabled"}>최종 선택</button></div>` : ""}</li>`;
                    }).join("")}</ul></section>`)
                  .join("");
                modalContent.innerHTML = `<div class="paper-panel max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-2xl border border-deep/12 p-5 shadow-2xl"><div class="mb-3 flex items-start justify-between gap-3"><div><h3 class="font-serif text-xl text-deep">${escapeHtml(book.title)}</h3><p class="text-sm text-deep/55">${escapeHtml(book.author || "저자 미입력")}</p><p class="mt-1"><span class="guide-badge">🚩 이번 책의 길잡이: ${escapeHtml(memberNameById(book.guideId))}</span></p></div><button class="btn-ghost !py-1.5 !text-xs" data-close-modal="1">닫기</button></div><p class="text-xs text-deep/60">${canSelect ? "최종 선택 전 길잡이 비밀번호를 재확인합니다." : "길잡이의 비밀번호가 일치하지 않습니다."}</p>${rows}</div>`;
              }
            } else if (type === "edit-book" || type === "book-settings") {
              const selectedId = meta.bookId || "";
              console.log("Edit modal opening for book ID:", selectedId);
              const selectedBook = bookById(selectedId);
              console.log("Found book:", selectedBook);
              const selectOptions = cache.books.map((b) => `<option value="${b.id}" ${selectedId === b.id ? "selected" : ""}>${b.id} · ${escapeHtml(b.title)}</option>`).join("");
              modalContent.innerHTML = `<div class="paper-panel max-h-[92vh] w-full max-w-xl overflow-y-auto rounded-t-2xl border border-deep/12 p-5 shadow-2xl sm:rounded-2xl"><div class="sticky top-0 z-10 -mx-5 -mt-5 mb-4 flex items-center justify-between border-b border-deep/10 bg-[#f7f1e5]/95 px-5 py-3 backdrop-blur"><h2 class="font-serif text-xl">책 정보 설정(관리자)</h2><button type="button" class="btn-ghost !px-2.5 !py-1 !text-xs" data-close-modal="1">닫기</button></div><form id="form-book-settings" class="grid gap-3"><div><label class="text-xs text-deep/60">책 선택</label><select class="input-field mt-1" name="bookPick"><option value="">새 ID 사용</option>${selectOptions}</select></div><div><label class="text-xs text-deep/60">새 ID (예: b11, 선택 입력)</label><input class="input-field mt-1" name="bookId" value="${selectedBook ? "" : escapeHtml(selectedId)}" placeholder="b1" /></div><div><label class="text-xs text-deep/60">책 제목</label><input class="input-field mt-1" name="title" value="${escapeHtml(selectedBook?.title || "")}" required /></div><div><label class="text-xs text-deep/60">저자</label><input class="input-field mt-1" name="author" value="${escapeHtml(selectedBook?.author || "")}" /></div><div><label class="text-xs text-deep/60">총 챕터 수</label><input class="input-field mt-1" type="number" min="1" max="150" name="totalChapters" value="${selectedBook?.totalChapters || 4}" required /></div><div><label class="text-xs text-deep/60">길잡이 지정</label><select class="input-field mt-1" name="guideId">${memberList().map((m) => `<option value="${m.id}" ${selectedBook?.guideId === m.id ? "selected" : ""}>${escapeHtml(m.display_name)}</option>`).join("")}</select></div><div><label class="text-xs text-deep/60">표지 이미지 URL</label><input class="input-field mt-1" name="coverUrl" value="${escapeHtml(selectedBook?.coverUrl || "")}" placeholder="https://..." /></div><button class="btn-primary w-full">저장</button></form></div>`;
            } else {
              // Use existing modal rendering for other types
              modalContent.innerHTML = renderAuthModal();
            }
          } else {
            // Hide modal
            modalOverlay.classList.add("hidden");
            modalContent.innerHTML = "";
          }
        }
      }
      function closeModal() {
        uiModal = { type: null, meta: {}, error: "" };
        
        // Hide global modal overlay
        const modalOverlay = document.getElementById("modal-overlay");
        const modalContent = document.getElementById("modal-content");
        if (modalOverlay && modalContent) {
          modalOverlay.style.display = 'none';
          modalOverlay.classList.add("hidden");
          modalContent.innerHTML = "";
        }
        
        // Re-enable scrolling
        document.body.style.overflow = 'auto';
      }
      
      // Attach functions to window object for global access
      window.openModal = openModal;
      window.closeModal = closeModal;
      function showToast(msg) {
        toastMessage = msg;
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toastMessage = "";
          renderApp();
        }, 2300);
      }
      function bookById(id) {
        return cache.books.find((b) => b.id === id) || null;
      }
      function ensureBook(id) {
        const hit = bookById(id);
        if (hit) return hit;
        const g = memberList()[0]?.id || "jeongeun";
        const totalChapters = 4;
        return {
          id,
          title: id,
          author: "",
          coverUrl: "",
          guideId: g,
          chapters: alignChaptersToTotal({}, totalChapters),
          totalChapters,
          finalSentence: { text: "", memberId: "", chapter: null },
          final_sentence_text: "",
          final_sentence_member_id: "",
          final_sentence_chapter: null,
          finalAt: null,
        };
      }
      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("이미지 파일을 읽지 못했습니다."));
          reader.readAsDataURL(file);
        });
      }
      function bookIdSortIndex(id) {
        const m = /^b(\d+)$/i.exec(String(id || ""));
        return m ? parseInt(m[1], 10) : 1e9;
      }
      function sortRows(rows) {
        return (rows || []).slice().sort((a, b) => bookIdSortIndex(a.id) - bookIdSortIndex(b.id));
      }
      function emptyChapterRecord() {
        const o = {};
        memberList().forEach((m) => (o[m.id] = ""));
        return o;
      }
      function alignChaptersToTotal(chapters, total) {
        const normalized = { ...(chapters || {}) };
        for (let c = 1; c <= total; c++) {
          if (!normalized[c]) normalized[c] = emptyChapterRecord();
        }
        Object.keys(normalized).forEach((k) => {
          const n = parseInt(k, 10);
          if (Number.isFinite(n) && n > total) delete normalized[k];
        });
        return normalized;
      }
      function normalizeMilestones(rawInput) {
        const raw = rawInput && typeof rawInput === "object" ? rawInput : {};
        const meta = raw._meta && typeof raw._meta === "object" ? raw._meta : {};
        const total = Math.max(1, parseInt(meta.totalChapters || 4, 10) || 4);
        const chapters = {};
        for (let c = 1; c <= total; c++) {
          const src = raw[c] ?? raw[String(c)] ?? {};
          const rec = emptyChapterRecord();
          memberList().forEach((m) => {
            rec[m.id] = typeof src[m.id] === "string" ? src[m.id] : "";
          });
          chapters[c] = rec;
        }
        return { chapters, total, guideIdInMeta: typeof meta.guideId === "string" ? meta.guideId : "" };
      }
            function normalizeBook(row, index) {
        const norm = normalizeMilestones(row.milestones);
        const rawGuide = row.guide_id || row.guide_name || norm.guideIdInMeta || "";
        const guideId = memberList().find((m) => m.id === rawGuide || m.display_name === rawGuide)?.id || memberList()[0]?.id || "jeongeun";
        const totalChapters = Math.max(1, parseInt(row.total_chapters ?? norm.total, 10) || norm.total || 4);
        
        return {
          id: row.id || `b${index + 1}`,
          title: row.title || `2026 독서 ${index + 1}`,
          author: row.author || "",
          coverUrl: row.cover_url || "",
          guideId,
          chapters: alignChaptersToTotal(norm.chapters, totalChapters),
          totalChapters,
          finalSentence: { text: "", memberId: "", chapter: null }, // Default empty object
          final_sentence_text: row.final_sentence_text || "", // New DB column
          final_sentence_member_id: row.final_sentence_member_id || "", // New DB column
          final_sentence_chapter: row.final_sentence_chapter || null, // New DB column
          finalAt: row.final_at || null,
          is_book_of_the_month: !!row.is_book_of_the_month, // Include DB field
        };
      }
      function serializeMilestones(book) {
        const p = { _meta: { totalChapters: book.totalChapters, guideId: book.guideId } };
        for (let c = 1; c <= book.totalChapters; c++) p[c] = book.chapters[c] || emptyChapterRecord();
        return p;
      }
      function bookToRow(book) {
        return {
          id: book.id,
          title: book.title,
          author: book.author || "",
          cover_url: book.coverUrl || null,
          guide_id: book.guideId,
          guide_name: memberNameById(book.guideId),
          total_chapters: book.totalChapters,
          milestones: serializeMilestones(book),
          final_sentence_text: book.final_sentence_text || "", // New DB column
          final_sentence_member_id: book.final_sentence_member_id || "", // New DB column
          final_sentence_chapter: book.final_sentence_chapter || null, // New DB column
          final_at: book.finalAt,
          is_book_of_the_month: !!book.is_book_of_the_month, // Include DB field
          updated_at: new Date().toISOString(),
        };
      }
      function chapterProgress(book) {
        const done = Array.from({ length: book.totalChapters }, (_, i) => i + 1).filter((c) => memberList().every((m) => (book.chapters[c]?.[m.id] || "").trim())).length;
        return { done, total: book.totalChapters, pct: Math.round((done / Math.max(1, book.totalChapters)) * 100) };
      }
      function isGuideFor(book) {
        return !!currentMemberId && book.guideId === currentMemberId;
      }

      async function loadMembers() {
        const { data, error } = await sb.from("club_members").select("id,display_name,sort_order,password,is_first_login").order("sort_order", { ascending: true });
        if (error) throw error;
        members = (data || []).map((m) => ({
          id: m.id,
          display_name: m.display_name,
          sort_order: m.sort_order,
          password: m.password || "",
          is_first_login: !!m.is_first_login,
        }));
      }
      async function refreshFromDb() {
        const { data, error } = await sb.from("books").select("*");
        if (error) throw error;
        const sorted = sortRows(data);
        if (!sorted.length) {
          const g = memberList()[0]?.id || "jeongeun";
          const seed = [];
          for (let i = 1; i <= BOOK_TOTAL; i++) {
            seed.push({
              id: `b${i}`,
              title: `2026 독서 ${i}`,
              author: "",
              cover_url: null,
              guide_id: g,
              guide_name: memberNameById(g),
              total_chapters: 4,
              milestones: { _meta: { totalChapters: 4, guideId: g }, 1: emptyChapterRecord(), 2: emptyChapterRecord(), 3: emptyChapterRecord(), 4: emptyChapterRecord() },
              final_sentence: { text: "", memberId: "", chapter: null },
              final_at: null,
            });
          }
          await sb.from("books").insert(seed);
          return refreshFromDb();
        }
        cache.books = sorted.map((row, i) => normalizeBook(row, i));
        // Find the book marked as Book of the Month in the database
        const bookOfTheMonth = cache.books.find(b => b.is_book_of_the_month === true);
        if (bookOfTheMonth) {
          currentBookId = bookOfTheMonth.id;
        } else if (!cache.books.find((b) => b.id === currentBookId)) {
          currentBookId = cache.books[0]?.id || "b1";
        }
      }
      async function persistBook(book) {
        const row = bookToRow(book);
        let { error } = await sb.from("books").upsert(row, { onConflict: "id" });
        if (error && /guide_(id|name)/i.test(String(error.message || ""))) {
          const fallback = { ...row };
          delete fallback.guide_id;
          delete fallback.guide_name;
          const retry = await sb.from("books").upsert(fallback, { onConflict: "id" });
          error = retry.error;
        }
        if (error) throw error;
      }
      async function setBookOfTheMonth(targetBookId) {
        // Single selection logic: Only ONE book can be Book of the Month
        try {
          // Find current Book of the Month
          const currentBookOfTheMonth = cache.books.find(b => b.id === currentBookId);
          
          // If changing to a different book, update the current one first
          if (currentBookOfTheMonth && currentBookOfTheMonth.id !== targetBookId) {
            await persistBook(currentBookOfTheMonth);
          }
          
          // Set the new Book of the Month
          currentBookId = targetBookId;
          const newBookOfTheMonth = bookById(targetBookId);
          if (newBookOfTheMonth) {
            await persistBook(newBookOfTheMonth);
          }
          
          await refreshFromDb();
          return true;
        } catch (error) {
          console.error('Error setting Book of the Month:', error);
          return false;
        }
      }
      function scheduleRefresh() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
          try {
            await refreshFromDb();
            renderApp();
          } catch (e) {
            loadError = e.message || String(e);
            renderApp();
          }
        }, 140);
      }
      function subscribeRealtime() {
        if (rtChannel) sb.removeChannel(rtChannel);
        rtChannel = sb.channel("bookvibe-live").on("postgres_changes", { event: "*", schema: "public", table: "books" }, scheduleRefresh).subscribe();
      }
      function setMemberSession(member) {
        currentMemberId = member.id;
        currentMemberName = member.display_name;
        sessionStorage.setItem("currentMemberId", member.id);
        sessionStorage.setItem("currentMemberName", member.display_name);
      }
      function clearMemberSession() {
        currentMemberId = "";
        currentMemberName = "";
        isAdminMode = false;
        sessionStorage.removeItem("currentMemberId");
        sessionStorage.removeItem("currentMemberName");
        sessionStorage.removeItem("isAdminMode");
      }

      window.saveSentence = async function(chapter, memberId) {
        // Authorization check
        if (memberId !== currentMemberId) {
          alert('자신의 문장만 수정할 수 있습니다.');
          return;
        }
        
        const li = document.querySelector(`[data-chapter="${chapter}"][data-member="${memberId}"]`);
        if (!li) return;
        
        const textarea = li.querySelector(`#edit-${chapter}-${memberId}`);
        const newSentence = textarea.value.trim();
        
        if (!newSentence) {
          alert('문장을 입력해주세요.');
          return;
        }
        
        try {
          const selected = cache.books.find((b) => b.id === currentBookId);
          if (!selected) return;
          
          // Update the sentence in cache
          if (!selected.chapters[chapter]) selected.chapters[chapter] = emptyChapterRecord();
          selected.chapters[chapter][memberId] = newSentence;
          
          // Update in Supabase
          await persistBook(selected);
          await refreshFromDb();
          
          // Re-render to show updated content
          renderApp();
          showToast('문장이 수정되었습니다.');
        } catch (error) {

        }

          return;

      window.setBookOfTheMonthDirect = async function(bookId, bookTitle) {

          return;

        // Prevent multiple clicks
        const button = document.getElementById(`btn-set-book-month-${bookId}`);
        if (!button || button.disabled) return;
        
        try {
          // Add loading state with visual feedback
          const originalText = button.textContent;
          button.disabled = true;
          button.textContent = '선정 중...';
          button.classList.add('opacity-70', 'cursor-wait', 'border-gold');
          
          console.log('Starting atomic Book of the Month update for:', bookId);
          
          // CRITICAL: Atomic database operations
          // Step 1: Clear ALL Book of the Month flags first
          const { error: clearError } = await sb.from("books").update({ is_book_of_the_month: false }).neq('id', 'nonexistent');
          if (clearError) {
            console.error('Error clearing Book of the Month flags:', clearError);
            throw clearError;
          }
          console.log('Cleared all Book of the Month flags');
          
          // Step 2: Set selected book as Book of the Month
          const { error: setError } = await sb.from("books").update({ is_book_of_the_month: true }).eq("id", bookId);
          if (setError) {
            console.error('Error setting new Book of the Month:', setError);
            throw setError;
          }
          console.log('Set new Book of the Month:', bookId);
          
          // CRITICAL: Immediate refresh sequence
          // Step 3: Update local state
          currentBookId = bookId;
          
          // Step 4: MUST refresh cache from database to ensure consistency
          console.log('Refreshing cache from database...');
          await refreshFromDb();
          
          // Step 5: MUST re-render entire application
          console.log('Re-rendering application...');
          renderApp();
          
          // Step 6: Do NOT switch tabs - keep current tab active
          renderApp();
          
          // Step 7: Close any open modals
          closeModal();
          
          // Step 8: Success feedback
          showToast(`"${bookTitle}"이(가) 이달의 책으로 선정되었습니다.`);
          console.log('Book of the Month update completed successfully');
          
        } catch (error) {
          console.error('Error setting Book of the Month:', error);
          showToast('이달의 책 선정에 실패했습니다.', 'error');
          
          // Restore button state on error
          if (button) {
            button.disabled = false;
            button.textContent = originalText;
            button.classList.remove('opacity-70', 'cursor-wait', 'border-gold');
          }
        }

      function formatFinalSentence(rawData) {
        // Extremely flexible - extract text regardless of format
        if (!rawData) return null;
        
        try {
          // If input is already an object with text field, return immediately
          if (typeof rawData === 'object' && rawData !== null && !Array.isArray(rawData) && 'text' in rawData) {
            const text = rawData.text;
            if (text && typeof text === 'string' && text.trim() !== '') {
              return `"${text.trim()}"`;
            }
          }
          
          // Try to parse if it's a string
          const data = safeParse(rawData);
          let extractedText = "";
          
          // Extract text from object or string
          if (typeof data === 'object' && data !== null && !Array.isArray(data)) {
            if (data.text && typeof data.text === 'string' && data.text.trim() !== '') {
              extractedText = data.text.trim();
            }
          } else if (typeof data === 'string' && data.trim() !== '') {
            extractedText = data.trim();
          }
          
          // Return formatted text if found
          if (extractedText && extractedText !== '{"text":"","memberId":"","chapter":null}') {
            return `"${extractedText}"`;
          }
        } catch (e) {
          console.log('Error parsing final sentence:', e);
        }
        
        return null;
      }

                            <button class="btn-ghost !px-3 !py-2 !text-xs" onclick="console.log('Edit button clicked for book:', '${book.id}'); event.stopPropagation(); window.openModal('edit-book', '${book.id}')">수정</button>

                          </div>
                          <button id="btn-set-book-month-${book.id}" 
                                  class="btn-primary !px-3 !py-2 !text-xs w-full ${book.is_book_of_the_month ? '!bg-gold !border-gold !cursor-not-allowed' : ''}" 
                                  onclick="setBookOfTheMonthDirect('${book.id}', '${escapeHtml(book.title)}')"
                                  ${book.is_book_of_the_month ? 'disabled' : ''}>
                            ${book.is_book_of_the_month ? '현재 이달의 책 ✓' : '이달의 책으로 선정'}
                          </button>
                        </div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              </section>`
            : "";
          
          const memberManagementSection = isAdmin
            ? `<section class="paper-panel mt-4 rounded-2xl border border-deep/10 p-4 shadow-sm"><h3 class="font-semibold text-deep mb-4">👥 멤버 관리</h3><div class="space-y-3">${(memberList?.() || []).map((m) => `<div class="rounded-lg border border-deep/10 bg-white/80 p-3"><p class="text-sm font-semibold">${escapeHtml(m.display_name)}</p><p class="mt-1 text-xs text-deep/55">is_first_login: ${m.is_first_login ? "true" : "false"}</p><form class="mt-2 grid gap-2 sm:grid-cols-2" data-member-reset="${m.id}"><button class="btn-ghost !text-xs">최초 로그인 초기화</button><input class="input-field" type="password" name="newPassword" placeholder="임시 비밀번호(선택)" /></form></div>`).join("")}</div></section>`
            : "";
          
          return `<main class="mx-auto max-w-content px-4 py-5 pb-28">${accountSettingsSection}${siteManagementSection}${memberManagementSection}</main>`;
        } catch (error) {
          console.error('Error rendering Settings tab:', error);
          return `<main class="mx-auto max-w-content px-4 py-5 pb-28"><section class="paper-panel rounded-2xl border border-deep/10 p-4 shadow-sm"><h3 class="font-semibold text-deep mb-4">🔐 계정 설정</h3><form id="form-change-password" class="mt-3 grid gap-2"><input class="input-field" type="password" name="currentPassword" placeholder="현재 비밀번호" required /><input class="input-field" type="password" name="newPassword" placeholder="새 비밀번호" required /><input class="input-field" type="password" name="confirmPassword" placeholder="새 비밀번호 확인" required /><button class="btn-primary">변경하기</button></form></section></main>`;
        }
      }
      function renderBookDetailModal(bookId) {
        const b = cache.books.find((x) => x.id === bookId);
        if (!b) return "";
        const canSelect = isGuideFor(b);
        const rows = Array.from({ length: b.totalChapters }, (_, i) => i + 1)
          .map((c) => `<section class="mt-3 rounded-lg border border-deep/10 bg-white/70 p-3"><h4 class="font-semibold text-sm text-deep">Chapter ${c}</h4><ul class="mt-2 space-y-2">${memberList().map((m) => {
            const txt = (b.chapters[c]?.[m.id] || "").trim();
            return `<li class="rounded-md border border-deep/10 px-2 py-2"><span class="text-[11px] font-semibold text-deep/55">${escapeHtml(m.display_name)}</span><p class="text-sm text-deep/85">${txt ? escapeHtml(txt) : `<span class="text-deep/35">기록 없음</span>`}</p>${txt ? `<div class="mt-1.5 text-right"><button type="button" class="btn-ghost !px-2.5 !py-1 !text-[11px] ${canSelect ? "" : "opacity-40"}" data-select-final="1" data-book="${b.id}" data-member="${m.id}" data-chapter="${c}" ${canSelect ? "" : "disabled"}>최종 선택</button></div>` : ""}</li>`;
          }).join("")}</ul></section>`)
          .join("");
        return `<div class="modal-bg fixed inset-0 z-40 flex items-end justify-center p-0 sm:items-center sm:p-5"><div class="paper-panel max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-t-2xl border border-deep/12 p-5 shadow-2xl sm:rounded-2xl"><div class="mb-3 flex items-start justify-between gap-3"><div><h3 class="font-serif text-xl text-deep">${escapeHtml(b.title)}</h3><p class="text-sm text-deep/55">${escapeHtml(b.author || "저자 미입력")}</p><p class="mt-1"><span class="guide-badge">🚩 이번 책의 길잡이: ${escapeHtml(memberNameById(b.guideId))}</span></p></div><button class="btn-ghost !py-1.5 !text-xs" data-close-detail="1">닫기</button></div><p class="text-xs text-deep/60">${canSelect ? "최종 선택 전 길잡이 비밀번호를 재확인합니다." : "길잡이의 비밀번호가 일치하지 않습니다."}</p>${rows}</div></div>`;
      }
      function renderBottomTabs() {
        const tab = (id, label) => `<button type="button" class="flex-1 py-3 text-center text-[12px] font-semibold ${currentTab === id ? "text-deep" : "text-deep/45"}" data-tab="${id}">${label}</button>`;
        return `<nav class="fixed bottom-0 left-0 right-0 z-30 border-t border-deep/10 bg-beige/95 backdrop-blur"><div class="mx-auto flex max-w-content">${tab("reading", "이달의 책")}${tab("shelf", "2026 북쉘프")}${tab("hall", "올해의 문장")}${tab("settings", "설정")}</div></nav>`;
      }
      function renderAuthModal() {
        if (!uiModal.type) return "";
        if (uiModal.type === "master") return `<div class="modal-bg fixed inset-0 z-50 flex items-center justify-center p-5"><div class="paper-panel w-full max-w-sm rounded-2xl border border-deep/10 p-6 shadow-2xl"><h2 class="font-serif text-2xl">BookVibe 2026</h2><form id="form-master-auth" class="mt-4 space-y-3"><input type="password" name="password" class="input-field" placeholder="마스터 비밀번호" required /><button class="btn-primary w-full">확인</button></form>${uiModal.error ? `<p class="mt-2 text-xs text-red-700">${escapeHtml(uiModal.error)}</p>` : ""}</div></div>`;
        if (uiModal.type === "member-login") return `<div class="modal-bg fixed inset-0 z-50 flex items-center justify-center p-5"><div class="paper-panel w-full max-w-sm rounded-2xl border border-deep/10 p-6 shadow-2xl"><h2 class="font-serif text-2xl">누구신가요?</h2><form id="form-member-login" class="mt-4 space-y-3"><select name="memberId" class="input-field">${memberList().map((m) => `<option value="${m.id}">${escapeHtml(m.display_name)}</option>`).join("")}</select><input type="password" name="password" class="input-field" placeholder="개인 비밀번호" required /><button class="btn-primary w-full">로그인</button></form>${uiModal.error ? `<p class="mt-2 text-xs text-red-700">${escapeHtml(uiModal.error)}</p>` : ""}</div></div>`;
        if (uiModal.type === "first-login") return `<div class="modal-bg fixed inset-0 z-50 flex items-center justify-center p-5"><div class="paper-panel w-full max-w-sm rounded-2xl border border-deep/10 p-6 shadow-2xl"><h2 class="font-serif text-xl">처음 오셨네요!</h2><p class="mt-2 text-sm text-deep/60">앞으로 사용할 비밀번호를 설정해주세요.</p><form id="form-first-password" class="mt-4 space-y-3"><input type="password" name="password" class="input-field" placeholder="새 비밀번호" required /><input type="password" name="confirmPassword" class="input-field" placeholder="새 비밀번호 확인" required /><button class="btn-primary w-full">저장</button></form>${uiModal.error ? `<p class="mt-2 text-xs text-red-700">${escapeHtml(uiModal.error)}</p>` : ""}</div></div>`;
        if (uiModal.type === "secure-confirm") return `<div class="modal-bg fixed inset-0 z-50 flex items-center justify-center p-5"><div class="paper-panel w-full max-w-sm rounded-2xl border border-deep/10 p-6 shadow-2xl"><h2 class="font-serif text-xl">본인 인증</h2><p class="mt-2 text-sm text-deep/60">${escapeHtml(uiModal.meta.message || "")}</p><form id="form-secure-confirm" class="mt-4 space-y-3"><input type="password" name="password" class="input-field" placeholder="개인 비밀번호" required /><button class="btn-primary w-full">확인</button></form>${uiModal.error ? `<p class="mt-2 text-xs text-red-700">${escapeHtml(uiModal.error)}</p>` : ""}</div></div>`;
        return "";
      }

      function renderApp() {
        const root = document.getElementById("app-root");
        if (!root) return;
        const main =
          isGatePassed && currentMemberId
            ? currentTab === "shelf"
              ? renderBookshelfTab()
              : currentTab === "hall"
              ? renderHallTab()
              : currentTab === "settings"
              ? renderSettingsTab()
              : renderReadingTab()
            : `<main class="min-h-screen"></main>`;
        const toast = toastMessage ? `<div class="toast">${escapeHtml(toastMessage)}</div>` : "";
        
        // Render main app content in app-root (modals are handled separately)
        root.innerHTML = `${isGatePassed && currentMemberId ? renderHeader() : ""}${main}${isGatePassed && currentMemberId ? renderBottomTabs() : ""}${toast}`;
      }

      function askSecure(action, message) {
        pendingSecureAction = action;
        openModal("secure-confirm", { message });
      }
      async function executeSecureAction() {
        if (!pendingSecureAction) return;
        if (pendingSecureAction.type === "final-select") {
          const { bookId, memberId, chapter } = pendingSecureAction.payload;
          const b = cache.books.find((x) => x.id === bookId);
          if (!b) return;
          const txt = (b.chapters[chapter]?.[memberId] || "").trim();
          if (!txt) return;
          
          // Keep updating the milestones JSON as usual to preserve history
          if (!b.chapters[chapter]) b.chapters[chapter] = emptyChapterRecord();
          b.chapters[chapter][memberId] = txt;
          
          // Update all three columns plus milestones JSON
          b.final_sentence_text = txt;
          b.final_sentence_member_id = memberId;
          b.final_sentence_chapter = chapter;
          b.finalAt = new Date().toISOString();
          
          await persistBook(b);
          await refreshFromDb();
        } else if (pendingSecureAction.type === "book-edit") {
          const { bookId, payload } = pendingSecureAction.payload;
          const b = cache.books.find((x) => x.id === bookId);
          if (!b) return;
          b.title = payload.title || b.title;
          b.author = payload.author || "";
          b.coverUrl = payload.coverUrl || "";
          if (isAdmin && payload.guideId) b.guideId = payload.guideId;
          const nextTotal = Math.max(1, parseInt(payload.totalChapters, 10) || 1);
          if (nextTotal > b.totalChapters) for (let c = b.totalChapters + 1; c <= nextTotal; c++) b.chapters[c] = emptyChapterRecord();
          if (nextTotal < b.totalChapters) for (let c = b.totalChapters; c > nextTotal; c--) delete b.chapters[c];
          b.totalChapters = nextTotal;
          await persistBook(b);
          await refreshFromDb();
        }
        pendingSecureAction = null;
      }

      function bindEvents() {
        document.addEventListener("click", (e) => {
          const t = e.target;
          const tab = t.closest && t.closest("[data-tab]");
          if (tab) {
            currentTab = tab.getAttribute("data-tab");
            return renderApp();
          }
          if (t.id === "btn-logout") {
            clearMemberSession();
            detailBookId = null;
            openModal("member-login");
            return renderApp();
          }
          if (t.id === "btn-book-settings") {
            // Check if user is chloe before allowing admin access
            const isAdmin = currentMemberId === 'chloe';
            
            if (isAdmin) {
              openModal("book-settings", { bookId: currentBookId || "b1" });
            } else {
              alert("관리자 기능에 접근할 수 없습니다.");
            }
            return renderApp();
          }
          const closeModalBtn = t.closest && t.closest("[data-close-modal]");
          if (closeModalBtn) {
            closeModal();
            return renderApp();
          }
// ... (rest of the code remains the same)
          const openBook = t.closest && t.closest("[data-open-book]");
          if (openBook) {
            const bookId = openBook.getAttribute("data-open-book");
            openModal("book-detail", { bookId });
            return;
          }
          const closeDetail = t.closest && t.closest("[data-close-detail]");
          if (closeDetail || (t.classList && t.classList.contains("modal-bg") && !uiModal.type)) {
            detailBookId = null;
            return renderApp();
          }
          const pick = t.closest && t.closest("[data-select-final]");
          if (pick) {
            const b = cache.books.find((x) => x.id === pick.getAttribute("data-book"));
            if (!b || !isGuideFor(b)) return alert("길잡이의 비밀번호가 일치하지 않습니다.");
            askSecure(
              { type: "final-select", payload: { bookId: pick.getAttribute("data-book"), memberId: pick.getAttribute("data-member"), chapter: parseInt(pick.getAttribute("data-chapter"), 10) } },
              "길잡이 본인 인증을 위해 비밀번호를 다시 입력하세요."
            );
            return renderApp();
          }
        });

        document.addEventListener("change", (e) => {
          const el = e.target;
          if (el && el.name === "bookPick" && uiModal.type === "book-settings") {
            const picked = (el.value || "").trim();
            openModal("book-settings", { bookId: picked || "" });
            renderApp();
          }
        });

        document.addEventListener("submit", async (e) => {
          const form = e.target;
          if (form.tagName !== "FORM") return;
          e.preventDefault();
          try {
            if (form.id === "form-master-auth") {
              const pw = form.elements.namedItem("password").value;
              if (pw !== USER_PASSWORD) {
                openModal("master", {}, "마스터 비밀번호가 올바르지 않습니다.");
                return renderApp();
              }
              isGatePassed = true;
              sessionStorage.setItem("isGatePassed", "true");
              openModal("member-login");
              return renderApp();
            }
            if (form.id === "form-member-login") {
              const memberId = form.elements.namedItem("memberId").value;
              const pw = form.elements.namedItem("password").value;
              const mem = memberList().find((m) => m.id === memberId);
              if (!mem) {
                openModal("member-login", {}, "멤버를 찾을 수 없습니다.");
                return renderApp();
              }
              if (mem.is_first_login) {
                setMemberSession(mem);
                openModal("first-login", { memberId: mem.id });
                return renderApp();
              }
              if ((mem.password || "") !== pw) {
                openModal("member-login", {}, "개인 비밀번호가 일치하지 않습니다.");
                return renderApp();
              }
              setMemberSession(mem);
              await refreshFromDb();
              subscribeRealtime();
              closeModal();
              return renderApp();
            }
            if (form.id === "form-first-password") {
              const mem = memberList().find((m) => m.id === uiModal.meta.memberId);
              if (!mem) return;
              const newPassword = form.elements.namedItem("password").value.trim();
              const confirmPassword = form.elements.namedItem("confirmPassword").value.trim();
              if (!newPassword || newPassword !== confirmPassword) {
                openModal("first-login", uiModal.meta, "비밀번호가 일치하지 않습니다.");
                return renderApp();
              }
              
              // CRITICAL: Ensure the Supabase update call is properly awaited with select()
              console.log("Updating password for:", currentMemberId); // Debugging
              const { data, error } = await sb
                .from('club_members')
                .update({ 
                  password: newPassword, 
                  is_first_login: false 
                })
                .eq('id', currentMemberId)
                .select(); // Use select() to confirm the update returned data

              if (error) {
                console.error("DB Update Error:", error);
                alert("Save failed: " + error.message);
                return;
              }
              
              console.log("Password successfully updated:", data);
              await loadMembers();
              await refreshFromDb();
              subscribeRealtime();
              closeModal();
              return renderApp();
            }
                        
                        
            if (form.id === "form-book-settings") {
              // Check if user is chloe before allowing admin access
              const isAdmin = currentMemberId === 'chloe';
              
              if (!isAdmin) {
                alert("관리자 기능에 접근할 수 없습니다.");
                return renderApp();
              }
              const pick = (form.elements.namedItem("bookPick").value || "").trim();
              const newId = (form.elements.namedItem("bookId").value || "").trim();
              const targetId = (newId || pick || "").trim();
              if (!/^b\d+$/i.test(targetId)) return alert("책 ID는 b1, b2 형식으로 입력해주세요.");
              const book = ensureBook(targetId.toLowerCase());
              book.title = (form.elements.namedItem("title").value || "").trim() || book.title;
              book.author = (form.elements.namedItem("author").value || "").trim();
              book.guideId = form.elements.namedItem("guideId").value;
              const nextTotal = Math.max(1, parseInt(form.elements.namedItem("totalChapters").value, 10) || 1);
              book.totalChapters = nextTotal;
              book.chapters = alignChaptersToTotal(book.chapters, nextTotal);
              const coverInput = (form.elements.namedItem("coverUrl").value || "").trim();
              if (coverInput) book.coverUrl = coverInput;
              const coverFileInput = form.elements.namedItem("coverFile");
              if (coverFileInput && coverFileInput.files && coverFileInput.files[0]) {
                book.coverUrl = await fileToDataUrl(coverFileInput.files[0]);
              }
              
              // Check if Book of the Month checkbox is checked
              const bookOfTheMonthCheckbox = form.elements.namedItem("bookOfTheMonth");
              const shouldSetAsBookOfTheMonth = bookOfTheMonthCheckbox && bookOfTheMonthCheckbox.checked;
              
              if (shouldSetAsBookOfTheMonth) {
                // Single selection logic: Set as Book of the Month
                const success = await setBookOfTheMonth(book.id);
                if (success) {
                  closeModal();
                  renderApp();
                  showToast(`"${escapeHtml(book.title)}"이(가) 이달의 책으로 지정되었습니다!`);
                } else {
                  showToast("책 정보 업데이트에 실패했습니다.", "error");
                }
              } else {
                // Just save book info without changing Book of the Month
                await persistBook(book);
                await refreshFromDb();
                closeModal();
                renderApp();
                showToast("책 정보가 성공적으로 업데이트되었습니다!");
              }
              return renderApp();
            }
            if (form.id === "form-secure-confirm") {
              const me = currentMember();
              const pw = form.elements.namedItem("password").value;
              if (!me || (me.password || "") !== pw) {
                openModal("secure-confirm", uiModal.meta, "길잡이의 비밀번호가 일치하지 않습니다.");
                return renderApp();
              }
              await executeSecureAction();
              closeModal();
              return renderApp();
            }
            if (!isGatePassed || !currentMemberId) return;
            if (form.id === "form-reading-input") {
              const chapter = parseInt(form.elements.namedItem("chapter").value, 10);
              const sentence = form.elements.namedItem("sentence").value.trim();
              const b = cache.books.find((x) => x.id === currentBookId);
              if (!b || !chapter || !currentMemberId || !sentence) return;
              if (!b.chapters[chapter]) b.chapters[chapter] = emptyChapterRecord();
              b.chapters[chapter][currentMemberId] = sentence;
              form.reset();
              await persistBook(b);
              await refreshFromDb();
              return renderApp();
            }
            if (form.id === "form-book-edit") {
              const bookId = form.getAttribute("data-book");
              const b = cache.books.find((x) => x.id === bookId);
              if (!b || (!isGuideFor(b) && !isAdmin)) return alert("해당 책의 길잡이만 수정 가능합니다.");
              askSecure(
                {
                  type: "book-edit",
                  payload: {
                    bookId,
                    payload: {
                      title: form.elements.namedItem("title").value.trim(),
                      author: form.elements.namedItem("author").value.trim(),
                      coverUrl: form.elements.namedItem("coverUrl").value.trim(),
                      guideId: form.elements.namedItem("guideId").value,
                      totalChapters: form.elements.namedItem("totalChapters").value,
                    },
                  },
                },
                "책 정보 수정 전 본인 비밀번호를 다시 입력하세요."
              );
              return renderApp();
            }
            if (form.id === "form-change-password") {
              const me = currentMember();
              if (!me) return;
              const cur = form.elements.namedItem("currentPassword").value;
              const next = form.elements.namedItem("newPassword").value;
              const conf = form.elements.namedItem("confirmPassword").value;
              if ((me.password || "") !== cur) return alert("현재 비밀번호가 일치하지 않습니다.");
              if (!next || next !== conf) return alert("새 비밀번호 확인이 일치하지 않습니다.");
              await sb.from("club_members").update({ password: next, is_first_login: false }).eq("id", me.id);
              await loadMembers();
              form.reset();
              return alert("비밀번호가 변경되었습니다.");
            }
            const resetId = form.getAttribute("data-member-reset");
            if (resetId) {
              if (!isAdmin) return;
              const temp = form.elements.namedItem("newPassword").value.trim();
              const patch = temp ? { password: temp, is_first_login: false } : { password: null, is_first_login: true };
              await sb.from("club_members").update(patch).eq("id", resetId);
              await loadMembers();
              renderApp();
              return alert("멤버 상태가 업데이트되었습니다.");
            }
          } catch (err) {
            alert(err.message || String(err));
          }
        });
      }

      document.addEventListener("DOMContentLoaded", async () => {
        try {
          await loadMembers();
          
          // Only open modals if user is not already logged in
          if (!isGatePassed) {
            openModal("master");
          } else if (!currentMemberId) {
            openModal("member-login");
          } else {
            // User is already logged in - ensure no modals are open
            closeModal();
            await refreshFromDb();
            subscribeRealtime();
          }
        } catch (err) {
          loadError = err.message || String(err);
          openModal("master");
        }
        bindEvents();
        
        // Safety check: ensure all modals are closed if user is logged in
        if (isGatePassed && currentMemberId) {
          closeModal();
        }
        
        // Ensure renderApp is only called after loadMembers and refreshFromDb are successfully completed
        renderApp();
      });
    </script>
  </body>
</html>
